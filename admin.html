<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Evanns Anonyme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Syne:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #07070a;
      --surface: #0e0e13;
      --surface2:#13131a;
      --border:  #1c1c24;
      --border2: #2a2a36;
      --gold:    #c8a84b;
      --gold2:   #edd98a;
      --silver:  #9898b0;
      --white:   #f0eee8;
      --red:     #e05555;
      --green:   #4caf7d;
      --r:       14px;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 0;
    }

    /* LOCK SCREEN */
    #lockScreen {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      padding: 24px;
    }

    .lock-card {
      background: var(--surface);
      border: 1px solid rgba(200,168,75,.25);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 40px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(200,168,75,.05);
      position: relative;
      overflow: hidden;
    }

    .lock-card::before {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .lock-icon { font-size: 3rem; margin-bottom: 20px; display: block; }

    .lock-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
    }

    .lock-sub {
      font-size: .78rem;
      color: var(--silver);
      margin-bottom: 28px;
      letter-spacing: .05em;
    }

    .lock-input {
      width: 100%;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border2);
      border-radius: var(--r);
      color: var(--white);
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      padding: 14px 18px;
      outline: none;
      text-align: center;
      letter-spacing: .3em;
      transition: border-color .3s, box-shadow .3s;
      margin-bottom: 16px;
    }

    .lock-input:focus {
      border-color: rgba(200,168,75,.5);
      box-shadow: 0 0 0 3px rgba(200,168,75,.08);
    }

    .lock-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #a8782a, var(--gold), var(--gold2), #a8782a);
      background-size: 200% 200%;
      border: none;
      border-radius: var(--r);
      color: #0a0800;
      font-family: 'Syne', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      cursor: pointer;
      animation: shimmer 4s ease-in-out infinite;
      transition: transform .2s, box-shadow .3s;
    }

    .lock-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(200,168,75,.3); }

    @keyframes shimmer {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    .lock-error {
      display: none;
      margin-top: 12px;
      font-size: .75rem;
      color: var(--red);
      letter-spacing: .05em;
    }

    .lock-error.show { display: block; }

    /* ADMIN APP */
    #adminApp { display: none; }

    /* TOPBAR */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }

    .topbar-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
    }

    .topbar-logo span {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .badge-count {
      background: rgba(200,168,75,.12);
      border: 1px solid rgba(200,168,75,.25);
      border-radius: 50px;
      padding: 4px 12px;
      font-size: .65rem;
      letter-spacing: .2em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid rgba(200,168,75,.2);
      border-radius: 50px;
      color: var(--silver);
      font-family: 'Syne', sans-serif;
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: all .3s;
    }

    .btn-logout:hover { border-color: rgba(200,168,75,.4); color: var(--gold); }

    /* CONTENT */
    .content {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
      display: block;
    }

    .stat-label {
      font-size: .6rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--silver);
      opacity: .7;
      margin-top: 4px;
      display: block;
    }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .toolbar-title {
      font-size: .65rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: .8;
    }

    .toolbar-actions { display: flex; gap: 8px; }

    .btn-sm {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--silver);
      font-family: 'Syne', sans-serif;
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .3s;
    }

    .btn-sm:hover { border-color: rgba(200,168,75,.4); color: var(--gold); }

    .btn-sm.danger:hover { border-color: rgba(224,85,85,.4); color: var(--red); }

    /* MESSAGES */
    .messages-list { display: flex; flex-direction: column; gap: 14px; }

    .msg-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px 22px;
      position: relative;
      transition: border-color .3s, transform .2s;
      animation: slideIn .3s ease forwards;
    }

    @keyframes slideIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .msg-card:hover { border-color: rgba(200,168,75,.2); transform: translateY(-1px); }

    .msg-card::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 2px; border-radius: 2px;
      background: linear-gradient(to bottom, var(--gold), transparent);
    }

    .msg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .msg-num {
      font-size: .6rem;
      letter-spacing: .2em;
      color: var(--gold);
      opacity: .6;
      text-transform: uppercase;
    }

    .msg-date {
      font-size: .6rem;
      color: var(--silver);
      opacity: .5;
      letter-spacing: .05em;
    }

    .msg-text {
      font-size: .92rem;
      color: var(--white);
      line-height: 1.75;
      opacity: .9;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .btn-copy, .btn-del {
      padding: 5px 12px;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
      font-size: .6rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .25s;
    }

    .btn-copy {
      background: rgba(200,168,75,.06);
      border: 1px solid rgba(200,168,75,.2);
      color: var(--gold);
    }

    .btn-copy:hover { background: rgba(200,168,75,.15); }

    .btn-del {
      background: rgba(224,85,85,.06);
      border: 1px solid rgba(224,85,85,.2);
      color: var(--red);
    }

    .btn-del:hover { background: rgba(224,85,85,.15); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--silver);
      opacity: .5;
    }

    .empty-emoji { font-size: 3rem; display: block; margin-bottom: 16px; }
    .empty-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1rem; }

    /* DISCORD LINK */
    .discord-banner {
      background: rgba(88,101,242,.08);
      border: 1px solid rgba(88,101,242,.25);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: .78rem;
      color: var(--silver);
    }

    .discord-icon { font-size: 1.3rem; }
    .discord-banner strong { color: #7289da; }
    .discord-banner a { color: #7289da; text-decoration: none; }
    .discord-banner a:hover { text-decoration: underline; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      z-index: 9997;
      background: var(--surface);
      border: 1px solid rgba(200,168,75,.3);
      border-radius: 50px;
      padding: 11px 22px;
      font-size: .78rem;
      color: var(--gold);
      letter-spacing: .08em;
      transition: transform .4s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 520px) {
      .topbar { padding: 12px 16px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .content { padding: 20px 16px 60px; }
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lock-card">
    <span class="lock-icon">🔐</span>
    <h1 class="lock-title">Espace Admin</h1>
    <p class="lock-sub">Entre le mot de passe pour accéder</p>
    <input
      type="password"
      class="lock-input"
      id="pwdInput"
      placeholder="••••••••"
      onkeydown="if(event.key==='Enter') checkPwd()"
    />
    <button class="lock-btn" onclick="checkPwd()">🔓 Accéder</button>
    <p class="lock-error" id="lockError">❌ Mot de passe incorrect</p>
  </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp">

  <div class="topbar">
    <div class="topbar-logo">Evanns <span>Admin</span></div>
    <div class="topbar-right">
      <span class="badge-count" id="topCount">0 messages</span>
      <button class="btn-logout" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="content">

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-num" id="statTotal">0</span>
        <span class="stat-label">Messages reçus</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statToday">0</span>
        <span class="stat-label">Aujourd'hui</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statWords">0</span>
        <span class="stat-label">Mots reçus</span>
      </div>
    </div>

    <!-- DISCORD BANNER -->
    <div class="discord-banner">
      <span class="discord-icon">💬</span>
      <span>Les messages arrivent aussi en <strong>temps réel sur Discord</strong>. <a href="https://discord.com" target="_blank">Ouvrir Discord →</a></span>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <span class="toolbar-title">✦ Messages anonymes</span>
      <div class="toolbar-actions">
        <button class="btn-sm" onclick="exportMessages()">⬇ Exporter</button>
        <button class="btn-sm danger" onclick="clearAll()">🗑 Tout supprimer</button>
      </div>
    </div>

    <!-- LIST -->
    <div class="messages-list" id="messagesList"></div>

  </div>
</div>

<script>
  // ── MOT DE PASSE ────────────────────────────────────
  // Change "admin2025" par ton mot de passe
  const ADMIN_PASSWORD = 'admin2025';
  const SESSION_KEY = 'evannsAdminAuth';

  function checkPwd() {
    const val = document.getElementById('pwdInput').value;
    if (val === ADMIN_PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, '1');
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('adminApp').style.display = 'block';
      loadMessages();
    } else {
      document.getElementById('lockError').classList.add('show');
      document.getElementById('pwdInput').value = '';
      document.getElementById('pwdInput').focus();
      setTimeout(() => document.getElementById('lockError').classList.remove('show'), 3000);
    }
  }

  function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    location.reload();
  }

  // Auto-login si session active
  if (sessionStorage.getItem(SESSION_KEY)) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
  }

  // ── TOAST ───────────────────────────────────────────
  function showToast(msg, ms=2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
  }

  // ── LOAD MESSAGES ───────────────────────────────────
  function loadMessages() {
    const messages = JSON.parse(localStorage.getItem('evannsMessages') || '[]');
    renderMessages(messages);
    updateStats(messages);
  }

  function updateStats(messages) {
    const today = new Date().toLocaleDateString('fr-FR');
    const todayCount = messages.filter(m => m.date && m.date.startsWith(today.split('/').reverse().join('/'))).length;
    const wordCount = messages.reduce((acc, m) => acc + m.text.split(/\s+/).filter(Boolean).length, 0);

    document.getElementById('statTotal').textContent = messages.length;
    document.getElementById('statToday').textContent = todayCount;
    document.getElementById('statWords').textContent = wordCount;
    document.getElementById('topCount').textContent = `${messages.length} message${messages.length !== 1 ? 's' : ''}`;
  }

  function renderMessages(messages) {
    const list = document.getElementById('messagesList');

    if (messages.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <span class="empty-emoji">🕊️</span>
          <p class="empty-text">Aucun message reçu pour l'instant…</p>
        </div>`;
      return;
    }

    list.innerHTML = messages.map((m, i) => `
      <div class="msg-card" id="card-${m.id}">
        <div class="msg-header">
          <span class="msg-num">✦ Message #${messages.length - i}</span>
          <span class="msg-date">${m.date || 'Date inconnue'}</span>
        </div>
        <p class="msg-text">${escapeHtml(m.text)}</p>
        <div class="msg-actions">
          <button class="btn-copy" onclick="copyMsg(${m.id})">📋 Copier</button>
          <button class="btn-del" onclick="deleteMsg(${m.id})">🗑 Supprimer</button>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function copyMsg(id) {
    const messages = JSON.parse(localStorage.getItem('evannsMessages') || '[]');
    const m = messages.find(x => x.id === id);
    if (m) {
      navigator.clipboard.writeText(m.text).then(() => showToast('✓ Copié !'));
    }
  }

  function deleteMsg(id) {
    let messages = JSON.parse(localStorage.getItem('evannsMessages') || '[]');
    messages = messages.filter(m => m.id !== id);
    localStorage.setItem('evannsMessages', JSON.stringify(messages));
    loadMessages();
    showToast('🗑 Message supprimé');
  }

  function clearAll() {
    if (!confirm('Supprimer tous les messages ? Cette action est irréversible.')) return;
    localStorage.removeItem('evannsMessages');
    loadMessages();
    showToast('🗑 Tous les messages supprimés');
  }

  function exportMessages() {
    const messages = JSON.parse(localStorage.getItem('evannsMessages') || '[]');
    if (messages.length === 0) { showToast('Aucun message à exporter'); return; }

    const text = messages.map((m, i) =>
      `[${m.date}] Message #${messages.length - i}\n${m.text}\n${'─'.repeat(40)}`
    ).join('\n\n');

    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `evanns-messages-${new Date().toISOString().split('T')[0]}.txt`;
    a.click();
    showToast('✓ Export téléchargé !');
  }

  // Auto-load si déjà connecté
  if (sessionStorage.getItem(SESSION_KEY)) loadMessages();
</script>
</body>
</html>
